server {
    listen 80;
    server_name sgpsmt.torfe.ar; # Puedes poner el dominio aquí
    root /var/www/html/public; # La carpeta pública de Laravel
    index index.php;

    # Manejo de errores
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # Reglas para Laravel (URLs amigables)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pasa los scripts PHP al contenedor FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000; # 'app' es el nombre del servicio PHP-FPM
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.ht {
        deny all;
    }
}